AWSTemplateFormatVersion: '2010-09-09'
Description: User Pool, App Client, and Domain for the file storage system MVP.

Resources:

  # User Pool
  MyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: FileApiUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      MfaConfiguration: "OFF"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Environment: Dev

  # App Client
  MyUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: FileApiClient
      UserPoolId: !Ref MyUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:8080/login
      LogoutURLs:
        - http://localhost:8080/logout
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: minutes
        IdToken: minutes
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60

  # Domain para Hosted UI
  MyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "fileapi-${AWS::AccountId}-${AWS::Region}-dev5310"
      UserPoolId: !Ref MyUserPool

Outputs:

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref MyUserPool

  CognitoAppClientId:
    Description: App Client Client ID
    Value: !Ref MyUserPoolClient

  CognitoDomain:
    Description: Hosted UI Domain
    Value: !Ref MyUserPoolDomain